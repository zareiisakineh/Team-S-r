<body>
  <main id="main-content" class="container">
     <div class="faq-item">
        <button class="faq-question" onclick="toggleFaq(this)">
          <span>Hva er 'prompt engineering'?</span>
          <i class="fas fa-chevron-down faq-icon"></i>
        </button>
        <div class="faq-answer">
          <p>Prompt engineering er teknikken for å formulere spørsmål eller instruksjoner (prompts) på en måte som får KI til å gi best mulig svar. Dette kan innebære å være spesifikk, tydelig, og strukturert i hvordan du stiller spørsmål eller gir oppdrag til KI.</p>
        </div>
      </div>
    </section>

 <script src="app.js" defer></script>
</main>
</body>
